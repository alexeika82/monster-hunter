<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>👹 MONSTER HUNTER — Telegram Mini App</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-rotate@0.1.4/dist/leaflet-rotate.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #e8f0f0;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            position: relative;
        }
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: linear-gradient(135deg, rgba(0,0,0,0.9), rgba(0,0,0,0.75));
            backdrop-filter: blur(12px);
            padding: 10px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(46,204,113,0.3);
            pointer-events: auto;
        }
        .logo {
            color: white;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            background: rgba(0,0,0,0.6);
            padding: 6px 12px;
            border-radius: 25px;
        }
        .stats {
            display: flex;
            gap: 15px;
            background: rgba(0,0,0,0.6);
            padding: 6px 16px;
            border-radius: 25px;
        }
        .stat {
            color: white;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .stat-value {
            font-weight: bold;
            color: #f1c40f;
            font-size: 16px;
        }
        .top-buttons {
            display: flex;
            gap: 8px;
        }
        .icon-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
        }
        .my-location-btn {
            background: #22c55e;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 6px 12px;
        }
        .rotate-lock-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .rotate-lock-btn.active {
            background: #e94560;
            color: white;
        }
        .distance-badge {
            font-size: 9px;
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            padding: 2px 6px;
            margin-top: 2px;
            color: #f1c40f;
        }
        .my-location-btn:active { background: #16a34a; transform: scale(0.97); }
        .wake-lock-indicator {
            position: absolute;
            top: 70px;
            left: 16px;
            z-index: 400;
            background: rgba(0,0,0,0.6);
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 10px;
            color: #2ecc71;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .map-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
        }
        #map { width: 100%; height: 100%; }
        
        .radar-container {
            position: absolute;
            bottom: 16px;
            right: 16px;
            z-index: 500;
            width: 100px;
            height: 100px;
            background: rgba(0,0,0,0.8);
            border-radius: 50%;
            border: 2px solid #2ecc71;
            box-shadow: 0 0 15px rgba(46,204,113,0.5);
            backdrop-filter: blur(5px);
            overflow: hidden;
        }
        .radar-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .radar-sweep {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: conic-gradient(from 0deg, transparent, rgba(46,204,113,0.3), transparent);
            border-radius: 50%;
            animation: sweep 3s linear infinite;
            pointer-events: none;
        }
        @keyframes sweep {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .radar-center {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }
        
        .vibro-bar-container {
            position: absolute;
            bottom: 130px;
            right: 16px;
            background: rgba(0,0,0,0.7);
            border-radius: 20px;
            padding: 6px 10px;
            z-index: 400;
            cursor: pointer;
        }
        .vibro-bar {
            width: 60px;
            height: 6px;
            background: #2c3e50;
            border-radius: 6px;
            overflow: hidden;
        }
        .vibro-bar-fill {
            width: 0%;
            height: 100%;
            background: #e94560;
            transition: width 0.1s;
        }
        .vibro-status {
            font-size: 8px;
            color: #95a5a6;
            text-align: center;
            margin-top: 2px;
        }
        
        .compass-container {
            position: absolute;
            bottom: 130px;
            left: 16px;
            z-index: 400;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 6px 12px;
            border: 1px solid #2ecc71;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: auto;
            cursor: pointer;
        }
        .compass-arrow { font-size: 20px; transition: transform 0.15s ease; }
        .compass-info { display: flex; flex-direction: column; align-items: flex-end; }
        .compass-distance { font-size: 11px; color: #f1c40f; font-weight: bold; }
        .compass-monster { font-size: 8px; color: white; }
        
        .nearby-info {
            position: absolute;
            top: 70px;
            right: 16px;
            z-index: 400;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 6px 12px;
            border-left: 3px solid #e94560;
            pointer-events: none;
            min-width: 110px;
        }
        .nearby-title { font-size: 8px; color: #95a5a6; }
        .nearby-name { color: #f1c40f; font-weight: bold; font-size: 12px; }
        .nearby-dist { color: #2ecc71; font-size: 10px; }
        
        .catch-panel {
            position: absolute;
            bottom: 80px;
            left: 16px;
            right: 16px;
            z-index: 400;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 24px;
            padding: 10px 14px;
            border: 2px solid #e94560;
            backdrop-filter: blur(10px);
            display: none;
            pointer-events: auto;
        }
        .catch-panel.active { display: block; animation: pulse 0.3s ease; }
        @keyframes pulse {
            0% { transform: scale(0.98); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .catch-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .catch-title { color: #e94560; font-size: 12px; font-weight: bold; }
        .catch-monster-name { color: #f1c40f; font-size: 16px; font-weight: bold; }
        .catch-distance { color: #95a5a6; font-size: 10px; margin-bottom: 6px; }
        .catch-progress { background: #2c3e50; border-radius: 25px; height: 8px; margin: 8px 0; overflow: hidden; }
        .catch-progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #f39c12, #e94560); transition: width 0.05s linear; }
        .catch-button {
            width: 100%; background: #e94560; border: none; padding: 12px; border-radius: 30px;
            color: white; font-weight: bold; font-size: 14px; cursor: pointer; margin-top: 6px;
        }
        .catch-button:active { transform: scale(0.97); }
        .catch-button.charging { background: #f39c12; }
        .hold-counter { text-align: center; font-size: 20px; font-weight: bold; color: #f1c40f; margin: 4px 0; }
        
        .sidebar {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 85%;
            max-width: 380px;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            border-radius: 0 24px 24px 0;
            overflow: hidden;
            pointer-events: auto;
        }
        .sidebar.open { transform: translateX(0); }
        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            background: #1e2a2a;
            border-bottom: 2px solid #2ecc71;
        }
        .sidebar-header span { color: white; font-size: 16px; font-weight: bold; }
        .close-sidebar { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .sidebar-tabs {
            display: flex;
            background: #0a1a15;
            flex-shrink: 0;
        }
        .sidebar-tab {
            flex: 1;
            padding: 14px 8px;
            text-align: center;
            cursor: pointer;
            color: #95a5a6;
            font-size: 13px;
            font-weight: bold;
        }
        .sidebar-tab.active {
            color: #f1c40f;
            border-bottom: 3px solid #f1c40f;
            background: rgba(241,196,15,0.1);
        }
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
        
        .bestiary-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .bestiary-card {
            background: #071f1a;
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            opacity: 0.4;
        }
        .bestiary-card.caught {
            opacity: 1;
            border: 2px solid #f1c40f;
            background: linear-gradient(135deg, #0a2a22, #071f1a);
        }
        .bestiary-emoji { font-size: 40px; }
        .bestiary-name { font-size: 12px; color: white; font-weight: bold; margin-top: 5px; }
        .bestiary-rarity { font-size: 9px; color: #f1c40f; margin-top: 3px; }
        
        .achievement-item, .daily-task {
            background: #071f1a;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .achievement-icon { font-size: 28px; }
        .achievement-info { flex: 1; margin-left: 12px; }
        .achievement-title, .daily-task-name { font-size: 13px; font-weight: bold; color: #f1c40f; }
        .achievement-desc, .daily-task-progress { font-size: 11px; color: #95a5a6; }
        .achievement-status { font-size: 24px; }
        .daily-reward { color: #2ecc71; font-weight: bold; font-size: 14px; }
        
        .shop-item {
            background: #071f1a;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            text-align: center;
        }
        .shop-coins { font-size: 18px; color: #f1c40f; font-weight: bold; margin-bottom: 12px; }
        .shop-btn {
            background: #2ecc71;
            border: none;
            padding: 10px;
            border-radius: 30px;
            color: #010f0a;
            font-weight: bold;
            margin-top: 8px;
            width: 100%;
            cursor: pointer;
            font-size: 13px;
        }
        
        .notification {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            z-index: 3000;
            animation: fadeOut 3s ease forwards;
            font-size: 12px;
            white-space: nowrap;
            pointer-events: none;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        
        @media (max-width: 480px) {
            .stat span:not(.stat-value) { display: none; }
            .logo span { display: none; }
            .radar-container { width: 85px; height: 85px; bottom: 12px; right: 12px; }
            .compass-container { bottom: 110px; left: 12px; }
            .vibro-bar-container { bottom: 110px; right: 12px; }
            .nearby-info { top: 60px; padding: 4px 10px; min-width: 95px; }
            .nearby-name { font-size: 11px; }
            .catch-panel { bottom: 70px; }
            .sidebar-tab { font-size: 11px; padding: 10px 4px; }
            .bestiary-emoji { font-size: 32px; }
            .wake-lock-indicator { top: 65px; left: 12px; font-size: 8px; }
            .icon-btn, .rotate-lock-btn { padding: 6px 10px; font-size: 11px; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="top-bar">
        <div class="logo"><i class="fas fa-skull"></i><span>HUNTER</span></div>
        <div class="stats">
            <div class="stat">🏆 <span class="stat-value" id="caughtCount">0</span></div>
            <div class="stat">👹 <span class="stat-value" id="monstersLeft">0</span></div>
            <div class="stat">⭐ <span class="stat-value" id="levelDisplay">1</span></div>
            <div class="stat">💰 <span class="stat-value" id="coinsDisplay">100</span></div>
        </div>
        <div class="top-buttons">
            <button class="icon-btn" id="menuBtn"><i class="fas fa-book"></i> КОЛЛЕКЦИЯ</button>
            <button class="rotate-lock-btn" id="toggleRotateBtn">🔒 БЛОКИРОВКА ПОВОРОТА</button>
            <button class="icon-btn my-location-btn" id="myLocationBtn">
                <i class="fas fa-location-dot"></i> Я ЗДЕСЬ
                <span class="distance-badge" id="nearestDistance">— м</span>
            </button>
        </div>
    </div>

    <div class="wake-lock-indicator" id="wakeLockIndicator">
        <i class="fas fa-sun"></i> <span>Экран активен</span>
    </div>

    <div class="map-container"><div id="map"></div></div>

    <div class="radar-container">
        <canvas id="radarCanvas" class="radar-canvas" width="100" height="100"></canvas>
        <div class="radar-sweep"></div>
        <div class="radar-center"></div>
    </div>

    <div class="vibro-bar-container" id="vibroToggle">
        <div class="vibro-bar"><div class="vibro-bar-fill" id="vibroBarFill"></div></div>
        <div class="vibro-status" id="vibroStatus">ВКЛ</div>
    </div>

    <div class="compass-container" id="compassBtn">
        <div class="compass-arrow" id="compassArrow">⬆️</div>
        <div class="compass-info">
            <div class="compass-distance" id="compassDistance">— м</div>
            <div class="compass-monster" id="compassMonster">—</div>
        </div>
    </div>

    <div class="nearby-info">
        <div class="nearby-title">🎯 БЛИЖАЙШАЯ ЦЕЛЬ</div>
        <div class="nearby-name" id="nearbyName">—</div>
        <div class="nearby-dist" id="nearbyDist">— м</div>
    </div>

    <div class="catch-panel" id="catchPanel">
        <div class="catch-header">
            <span class="catch-title">⚠️ В ЗОНЕ ЛОВЛИ!</span>
            <span class="catch-monster-name" id="catchMonsterName">МОНСТР</span>
        </div>
        <div class="catch-distance" id="catchDistance">Расстояние: -- м</div>
        <div class="catch-progress"><div class="catch-progress-bar" id="catchProgress"></div></div>
        <div class="hold-counter" id="holdCounter">0.0</div>
        <button class="catch-button" id="catchButton">👆 УДЕРЖИВАЙТЕ ДЛЯ ЛОВЛИ</button>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span><i class="fas fa-trophy"></i> ПРОФИЛЬ ОХОТНИКА</span>
            <button class="close-sidebar" id="closeSidebar"><i class="fas fa-times"></i></button>
        </div>
        <div class="sidebar-tabs">
            <div class="sidebar-tab active" data-tab="bestiary">📖 БЕСТИАРИЙ</div>
            <div class="sidebar-tab" data-tab="achievements">🏆 ДОСТИЖЕНИЯ</div>
            <div class="sidebar-tab" data-tab="daily">📅 ЗАДАНИЯ</div>
            <div class="sidebar-tab" data-tab="shop">🛒 МАГАЗИН</div>
        </div>
        <div class="sidebar-content">
            <div class="tab-pane active" id="bestiaryTab"><div id="bestiaryGrid">Загрузка...</div></div>
            <div class="tab-pane" id="achievementsTab"><div id="achievementsList">Загрузка...</div></div>
            <div class="tab-pane" id="dailyTab"><div id="dailyTasksList">Загрузка...</div></div>
            <div class="tab-pane" id="shopTab"><div id="shopList">Загрузка...</div></div>
        </div>
    </div>
</div>

<script>
    // ========== TELEGRAM MINI APP ==========
    let telegramUser = null;
    let isTelegramWebApp = false;
    
    if (window.Telegram && window.Telegram.WebApp) {
        isTelegramWebApp = true;
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        telegramUser = tg.initDataUnsafe?.user;
        if (telegramUser) {
            console.log("Telegram user:", telegramUser.first_name);
        }
        if (tg.themeParams.bg_color) {
            document.body.style.backgroundColor = tg.themeParams.bg_color;
        }
    }

    // ========== ГЕОЛОКАЦИЯ С СОХРАНЕНИЕМ ПОСЛЕДНЕЙ ПОЗИЦИИ ==========
let geoWatchId = null;
let lastGeoPosition = null;
let isGeoActive = false;
let geoPermissionDenied = false;

// Сохраняем последнюю позицию в localStorage
function saveLastPosition(lat, lng) {
    localStorage.setItem('lastSavedLat', lat);
    localStorage.setItem('lastSavedLng', lng);
    localStorage.setItem('lastSavedTime', Date.now());
}

// Загружаем сохранённую позицию
function loadLastPosition() {
    const lat = localStorage.getItem('lastSavedLat');
    const lng = localStorage.getItem('lastSavedLng');
    const savedTime = localStorage.getItem('lastSavedTime');
    
    if (lat && lng && savedTime) {
        // Если позиция сохранена меньше часа назад
        if (Date.now() - parseInt(savedTime) < 3600000) {
            return { lat: parseFloat(lat), lng: parseFloat(lng) };
        }
    }
    return null;
}

// Восстановление позиции из сохранённой (без запроса геолокации)
function restoreLastPosition() {
    const savedPos = loadLastPosition();
    if (savedPos && typeof updateUserPosition === 'function') {
        updateUserPosition(savedPos.lat, savedPos.lng);
        showNotification('📍 Позиция восстановлена из сохранённой', false);
        return true;
    }
    return false;
}

function stopGeoWatch() {
    if (geoWatchId !== null) {
        navigator.geolocation.clearWatch(geoWatchId);
        geoWatchId = null;
    }
    isGeoActive = false;
}

function startGeoWatch() {
    if (!navigator.geolocation || geoPermissionDenied) return;
    
    stopGeoWatch();
    
    geoWatchId = navigator.geolocation.watchPosition(
        function(position) {
            lastGeoPosition = position;
            isGeoActive = true;
            // Сохраняем позицию
            saveLastPosition(position.coords.latitude, position.coords.longitude);
            if (typeof updateUserPosition === 'function') {
                updateUserPosition(position.coords.latitude, position.coords.longitude);
            }
        },
        function(error) {
            console.log("Geo watch error:", error.code);
            if (error.code === 1) { // PERMISSION_DENIED
                geoPermissionDenied = true;
                isGeoActive = false;
            }
        },
        {
            enableHighAccuracy: true,
            maximumAge: 5000,
            timeout: 10000
        }
    );
}

// Запрос геолокации (только ОДИН раз)
let hasRequestedGeo = false;

function requestGeolocationOnce() {
    if (!navigator.geolocation) {
        showNotification('❌ Геолокация не поддерживается', true);
        return;
    }
    
    // Если уже разрешено, просто запускаем слежение
    if (geoPermissionDenied === false && isGeoActive === false && hasRequestedGeo) {
        startGeoWatch();
        return;
    }
    
    hasRequestedGeo = true;
    
    showNotification('📍 Запрос геолокации...', false);
    
    navigator.geolocation.getCurrentPosition(
        function(position) {
            lastGeoPosition = position;
            isGeoActive = true;
            geoPermissionDenied = false;
            saveLastPosition(position.coords.latitude, position.coords.longitude);
            if (typeof updateUserPosition === 'function') {
                updateUserPosition(position.coords.latitude, position.coords.longitude);
            }
            startGeoWatch();
            showNotification('✅ Геолокация активирована!', false);
            localStorage.setItem('geoPermissionGranted', 'true');
        },
        function(error) {
            console.log("Geo error:", error.code);
            if (error.code === 1) { // PERMISSION_DENIED
                geoPermissionDenied = true;
                showNotification('❌ Нужен доступ к геолокации для игры!', true);
            } else if (error.code === 2 || error.code === 3) {
                // Таймаут или недоступно — используем сохранённую позицию
                restoreLastPosition();
                setTimeout(requestGeolocationOnce, 2000);
            }
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 }
    );
}

// Принудительное обновление позиции (по кнопке)
function forceRefreshLocation() {
    if (geoPermissionDenied) {
        showNotification('⚠️ Сначала разрешите доступ к геолокации', true);
        // Пытаемся запросить снова
        geoPermissionDenied = false;
        requestGeolocationOnce();
        return;
    }
    
    showNotification('🔄 Обновление позиции...', false);
    
    navigator.geolocation.getCurrentPosition(
        function(position) {
            saveLastPosition(position.coords.latitude, position.coords.longitude);
            if (typeof updateUserPosition === 'function') {
                updateUserPosition(position.coords.latitude, position.coords.longitude);
            }
            showNotification('✅ Позиция обновлена!', false);
        },
        function(error) {
            if (error.code === 1) {
                geoPermissionDenied = true;
                showNotification('❌ Нет доступа к геолокации', true);
            } else {
                // Используем сохранённую позицию
                restoreLastPosition();
            }
        },
        { enableHighAccuracy: true, timeout: 5000 }
    );
}

// Восстановление при возврате в приложение (НЕ запрашивает повторно!)
function restoreOnResume() {
    console.log("App resumed, restoring from saved position...");
    
    // Если позиция активна — используем её
    if (isGeoActive && lastGeoPosition) {
        if (typeof updateUserPosition === 'function') {
            updateUserPosition(lastGeoPosition.coords.latitude, lastGeoPosition.coords.longitude);
        }
        showNotification('📍 Позиция восстановлена', false);
        return;
    }
    
    // Если нет активной позиции, но есть сохранённая
    if (restoreLastPosition()) {
        return;
    }
    
    // Если ничего нет, показываем кнопку
    showNotification('📍 Нажмите "Я ЗДЕСЬ" для определения позиции', false);
}

    function drawRadar() {
        if (!ctx || !userPosition) return;
        const size = 100;
        ctx.clearRect(0, 0, size, size);
        ctx.strokeStyle = '#2ecc71';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.arc(size/2, size/2, size/2 - 5, 0, 2 * Math.PI);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(size/2, size/2, (size/2 - 5) * 0.66, 0, 2 * Math.PI);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(size/2, size/2, (size/2 - 5) * 0.33, 0, 2 * Math.PI);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(size/2, 5);
        ctx.lineTo(size/2, size-5);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(5, size/2);
        ctx.lineTo(size-5, size/2);
        ctx.stroke();
        
        const maxRadarDistance = 300;
        monsters.forEach(monster => {
            if (monster.isCaught) return;
            const dist = getDistance(userPosition.lat, userPosition.lng, monster.lat, monster.lng);
            if (dist > maxRadarDistance) return;
            const angle = getAngleToMonster(monster);
            const radarDist = (dist / maxRadarDistance) * (size/2 - 8);
            const radarX = size/2 + Math.sin(angle * Math.PI / 180) * radarDist;
            const radarY = size/2 - Math.cos(angle * Math.PI / 180) * radarDist;
            let color = '#e94560';
            if (monster.rarity === 'rare') color = '#f39c12';
            if (monster.rarity === 'epic') color = '#9b59b6';
            if (monster.rarity === 'legendary') color = '#f1c40f';
            ctx.beginPath();
            ctx.arc(radarX, radarY, 4, 0, 2 * Math.PI);
            ctx.fillStyle = color;
            ctx.fill();
        });
    }

    function getAngleToMonster(monster) {
        if (!userPosition) return 0;
        const deltaX = monster.lng - userPosition.lng;
        const deltaY = monster.lat - userPosition.lat;
        let angle = Math.atan2(deltaX, deltaY) * 180 / Math.PI;
        angle = (angle - currentHeading + 360) % 360;
        return angle;
    }

    function spawnMonstersIfNeeded() {
        if (!userPosition) return;
        const today = new Date().toDateString();
        if (monsters.length > 0 && lastSpawnDate === today) {
            updateMonstersMap();
            updateUI();
            return;
        }
        monsters = [];
        const baseCount = Math.min(8, 4 + Math.floor(Math.random() * 4) + Math.floor(level / 5));
        for (let i = 0; i < baseCount; i++) {
            const type = MONSTER_TYPES[Math.floor(Math.random() * MONSTER_TYPES.length)];
            const angle = Math.random() * Math.PI * 2;
            const radius = 150 + Math.random() * 350;
            const deltaLat = (radius * Math.cos(angle)) / 111300;
            const deltaLng = (radius * Math.sin(angle)) / (111300 * Math.cos(userPosition.lat * Math.PI / 180));
            monsters.push({
                id: Date.now() + i + Math.random(),
                lat: userPosition.lat + deltaLat, lng: userPosition.lng + deltaLng,
                type: type, name: type.name, emoji: type.emoji, color: type.color,
                catchTime: type.catchTime, rarity: type.rarity, reward: type.reward, isCaught: false
            });
        }
        lastSpawnDate = today;
        updateMonstersMap();
        updateUI();
        saveData();
        showNotification(`👹 Появилось ${monsters.length} монстров!`);

    function updateMonstersMap() {

    window.buildRouteToMonsterById = function(id) {
        const monster = monsters.find(m => m.id === id);

    function getDistance(lat1, lng1, lat2, lng2) {
        const R = 6371000;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLng = (lng2 - lng1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLng/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function getTargetMonster() {
        if (!userPosition) return null;
        if (selectedMonsterRoute && !selectedMonsterRoute.isCaught) {
            const dist = getDistance(userPosition.lat, userPosition.lng, selectedMonsterRoute.lat, selectedMonsterRoute.lng);
            return { monster: selectedMonsterRoute, distance: dist, isRouteTarget: true };
        }
        let nearest = null, minDist = Infinity;
        monsters.forEach(m => {
            if (m.isCaught) return;
            const d = getDistance(userPosition.lat, userPosition.lng, m.lat, m.lng);
            if (d < minDist) { minDist = d; nearest = m; }
        });
        return { monster: nearest, distance: minDist, isRouteTarget: false };
    }

    function updateCompass() {
        const target = getTargetMonster();
        if (!target || !target.monster || !userPosition) {
            compassArrow.style.transform = `rotate(0deg)`;
            compassDistanceSpan.innerText = '— м';
            compassMonsterSpan.innerText = '—';
            nearbyNameSpan.innerHTML = '—';
            nearbyDistSpan.innerHTML = '— м';
            if (nearestDistanceSpan) nearestDistanceSpan.innerText = '— м';
            if (vibroBarFill) vibroBarFill.style.width = '0%';
            return;
        }
        const deltaX = target.monster.lng - userPosition.lng;
        const deltaY = target.monster.lat - userPosition.lat;
        let angle = Math.atan2(deltaX, deltaY) * 180 / Math.PI;
        angle = (angle - currentHeading + 360) % 360;
        compassArrow.style.transform = `rotate(${angle}deg)`;
        compassDistanceSpan.innerText = `${Math.round(target.distance)} м`;
        compassMonsterSpan.innerText = `${target.monster.emoji} ${target.monster.name}`;
        
        nearbyNameSpan.innerHTML = `${target.monster.emoji} ${target.monster.name}${target.isRouteTarget ? ' (маршрут)' : ''}`;
        nearbyDistSpan.innerHTML = `${Math.round(target.distance)} м`;
        if (nearestDistanceSpan) nearestDistanceSpan.innerText = `${Math.round(target.distance)} м`;
        
        updateVibroCompass(angle);
        return target;
    }

    function updateUIAndCatch() {

        const target = updateCompass();

        if (target && target.monster && target.distance <= 20 && !target.monster.isCaught) {

                catchPanel.classList.add('active');
                showNotification(`⚠️ ${target.monster.name} в зоне поражения! Ловите!`);
                doVibration(150);

            currentCatchMonster = target.monster;
            currentCatchDistance = target.distance;
            catchMonsterNameSpan.innerHTML = `${target.monster.emoji} ${target.monster.name}`;
            catchDistanceSpan.innerHTML = `Расстояние: ${Math.round(target.distance)} м`;

            catchPanel.classList.remove('active');

    function catchMonsterLogic() {
        if (!currentCatchMonster || currentCatchMonster.isCaught) return;
        const monster = currentCatchMonster;
        monster.isCaught = true;
        caughtCount++;
        totalCaught++;
        addCoins(monster.reward);
        addExp(monster.reward);
        
        if (!bestiary[monster.name]) {
            bestiary[monster.name] = true;
            renderBestiary();
        }
        
        const now = Date.now();
        if (now - lastCatchTime < 300000) {
            comboCounter++;
            if (comboCounter >= 3) addCoins(monster.reward * (comboCounter - 1));
        } else comboCounter = 1;
        lastCatchTime = now;
        
        clearRoute();
        
        updateMonstersMap();
        updateUI();
        saveData();
        showNotification(`🎉 ПОЙМАН! ${monster.emoji} ${monster.name}! +${monster.reward} монет!`);
        doVibration(300);
        
        catchPanel.classList.remove('active');
        currentCatchMonster = null;
    }

    function startCatch() {
        if (!currentCatchMonster || currentCatchMonster.isCaught) return;
        if (currentCatchDistance > 20) { showNotification('❌ Слишком далеко!', true); return; }
        if (isCharging) return;
        isCharging = true;
        chargeStartTime = Date.now();
        catchButton.classList.add('charging');
        catchButton.innerHTML = '⚡ ЛОВЛЯ... НЕ ОТПУСКАЙТЕ ⚡';
        
        catchInterval = setInterval(() => {
            if (!isCharging) return;
            const elapsed = Date.now() - chargeStartTime;
            catchProgressBar.style.width = Math.min(100, (elapsed / currentCatchMonster.catchTime) * 100) + '%';
            holdCounterSpan.innerText = (elapsed / 1000).toFixed(1);
            if (elapsed >= currentCatchMonster.catchTime) {
                clearInterval(catchInterval);
                catchInterval = null;
                isCharging = false;
                catchButton.classList.remove('charging');
                catchButton.innerHTML = '👆 УДЕРЖИВАЙТЕ ДЛЯ ЛОВЛИ';
                holdCounterSpan.innerText = '0.0';
                catchProgressBar.style.width = '0%';
                catchMonsterLogic();
            }
        }, 50);
    }

    function stopCatch() {
        if (!isCharging) return;
        clearInterval(catchInterval);
        catchInterval = null;
        isCharging = false;
        catchButton.classList.remove('charging');
        catchButton.innerHTML = '👆 УДЕРЖИВАЙТЕ ДЛЯ ЛОВЛИ';
        holdCounterSpan.innerText = '0.0';

                <div class="achievement-icon">${a.icon}</div>
                <div class="achievement-info">
                    <div class="achievement-title">${a.name}</div>
                    <div class="achievement-desc">${a.desc}</div>
                </div>
                <div class="achievement-status">${a.done ? '✅' : '🔒'}</div>
            </div>
        `).join('');
    }

    function renderDailyTasks() {
        const container = document.getElementById('dailyTasksList');
        if (!container) return;
        container.innerHTML = `
            <div class="daily-task">
                <div><div class="daily-task-name">🐙 Поймать 3 монстров</div><div class="daily-task-progress">${caughtCount}/3</div></div>
                <div class="daily-reward">💰 30</div>
            </div>
            <div class="daily-task">
                <div><div class="daily-task-name">👟 Пройти 500 метров</div><div class="daily-task-progress">${Math.floor(totalDistance)}/500</div></div>
                <div class="daily-reward">💰 25</div>
            </div>
        `;
    }

    function renderShop() {
        const container = document.getElementById('shopList');
        if (!container) return;
        container.innerHTML = `
            <div class="shop-item">
                <div class="shop-coins"><i class="fas fa-coins"></i> ${coins} монет</div>
                <button class="shop-btn" id="radarShopBtn">🔍 РАДАР (50) - найти всех монстров</button>
                <button class="shop-btn" id="baitBtn">🍖 ПРИМАНКА (30) - привлечь монстра</button>
                <button class="shop-btn" id="geoRetryBtn" style="background:#f39c12;">📍 ПЕРЕЗАПРОСИТЬ ГЕОЛОКАЦИЮ</button>
            </div>
        `;
        document.getElementById('radarShopBtn')?.addEventListener('click', () => {
            if (coins >= 50) {
                coins -= 50; updateUI(); saveData(); renderShop();
                showNotification('🔍 РАДАР активирован! Все монстры видны!');
                monsterMarkers.forEach(m => m.setOpacity(1));
                setTimeout(() => monsterMarkers.forEach(m => m.setOpacity(0.7)), 10000);
            } else showNotification('❌ Не хватает монет!', true);
        });
        document.getElementById('baitBtn')?.addEventListener('click', () => {
            if (coins >= 30 && userPosition) {
                coins -= 30; updateUI(); saveData(); renderShop();
                const type = MONSTER_TYPES[Math.floor(Math.random() * MONSTER_TYPES.length)];
                const angle = Math.random() * Math.PI * 2;
                const radius = 80;
                const deltaLat = (radius * Math.cos(angle)) / 111300;
                const deltaLng = (radius * Math.sin(angle)) / (111300 * Math.cos(userPosition.lat * Math.PI / 180));
                monsters.push({
                    id: Date.now() + Math.random(),
                    lat: userPosition.lat + deltaLat, lng: userPosition.lng + deltaLng,
                    type: type, name: type.name, emoji: type.emoji, color: type.color,
                    catchTime: type.catchTime, rarity: type.rarity, reward: type.reward, isCaught: false
                });
                updateMonstersMap();
                saveData();
                showNotification(`🍖 Приманка привлекла ${type.emoji} ${type.name}!`);
            } else showNotification('❌ Не хватает монет или нет позиции!', true);
        });
        document.getElementById('geoRetryBtn')?.addEventListener('click', () => {
            stopGeoWatch();
            requestGeolocationOnce();
        });
    }

    function updateUserPosition(lat, lng, heading = null) {
        if (lastLatLng) {
            const d = getDistance(lastLatLng.lat, lastLatLng.lng, lat, lng);
            totalDistance += d;
            if (totalDistance >= 5000 && !achievements.walker) {
                achievements.walker = true;
                showNotification('🏆 ДОСТИЖЕНИЕ: Марафонец! +20 монет!');
                addCoins(20);
                renderAchievements();
            }
            saveData();
        }
        lastLatLng = { lat, lng };
        userPosition = { lat, lng };
        
        if (heading !== null && !isNaN(heading)) {
            currentHeading = heading;
        }
        
        if (userMarker) map.removeLayer(userMarker);
        
        const userIcon = L.divIcon({
            html: `<div style="position:relative;"><div style="background:#22c55e;width:20px;height:20px;border-radius:50%;border:3px solid white;box-shadow:0 0 12px #22c55e;"></div><div style="position:absolute;top:-18px;left:2px;font-size:16px;transform:rotate(${currentHeading}deg);">⬆️</div></div>`,
            iconSize: [20, 30], iconAnchor: [10, 10]
        });
        userMarker = L.marker([lat, lng], { icon: userIcon }).addTo(map).bindPopup('📍 ВЫ ЗДЕСЬ');
        
        if (shouldCenterOnMe) {
            map.setView([lat, lng], 18);
            shouldCenterOnMe = false;
        }
        
        spawnMonstersIfNeeded();
        updateUIAndCatch();
        saveData();
    }

    function getCurrentLocation() {
        requestGeolocationOnce();
    }

    function startTracking() {
        getCurrentLocation();
        
        setInterval(() => updateUIAndCatch(), 1000);
        
        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', (e) => {
                let heading = null;
                if (e.webkitCompassHeading !== undefined) heading = e.webkitCompassHeading;
                else if (e.alpha !== null) heading = 360 - e.alpha;
                if (heading !== null && userPosition) {
                    currentHeading = heading;
                    const newIcon = L.divIcon({
                        html: `<div style="position:relative;"><div style="background:#22c55e;width:20px;height:20px;border-radius:50%;border:3px solid white;box-shadow:0 0 12px #22c55e;"></div><div style="position:absolute;top:-18px;left:2px;font-size:16px;transform:rotate(${currentHeading}deg);">⬆️</div></div>`,
                        iconSize: [20, 30], iconAnchor: [10, 10]
                    });
                    if (userMarker) userMarker.setIcon(newIcon);
                }
                updateCompass();
            });
        }
    }

    function initMap() {
        map = L.map('map', { rotate: true, rotateControl: false, touchRotate: true, trackResize: true }).setView([55.751244, 37.618423], 18);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors',
            maxZoom: 19, minZoom: 10
        }).addTo(map);
        if (map.touchRotate) map.touchRotate.enable();
        map.on('click', () => { if (currentRouteLine) clearRoute(); });
        
        if (radarCanvas) {
            radarCanvas.width = 100;
            radarCanvas.height = 100;
            ctx = radarCanvas.getContext('2d');
        }
        
        loadData();
        startTracking();
        
        catchButton.addEventListener('mousedown', startCatch);
        catchButton.addEventListener('mouseup', stopCatch);
        catchButton.addEventListener('mouseleave', stopCatch);
        catchButton.addEventListener('touchstart', (e) => { e.preventDefault(); startCatch(); });
        catchButton.addEventListener('touchend', (e) => { e.preventDefault(); stopCatch(); });
        
        document.getElementById('myLocationBtn').addEventListener('click', () => { if (userPosition) centerOnUser(); else getCurrentLocation(); });
        document.getElementById('menuBtn').addEventListener('click', () => document.getElementById('sidebar').classList.add('open'));
        document.getElementById('closeSidebar').addEventListener('click', () => document.getElementById('sidebar').classList.remove('open'));
        document.getElementById('toggleRotateBtn').addEventListener('click', toggleRotationLock);
        document.getElementById('compassBtn').addEventListener('click', resetMapRotation);
        document.getElementById('vibroToggle').addEventListener('click', toggleVibration);
        
        document.querySelectorAll('.sidebar-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(`${tab.dataset.tab}Tab`).classList.add('active');
            });
        });
    }
    
    initMap();
</script>
</body>
</html>
